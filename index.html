<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Paradise AI Assistant Test</title>

  <link href="https://cdn.jsdelivr.net/npm/@n8n/chat/dist/style.css" rel="stylesheet" />

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, sans-serif;
      background: transparent;
    }

    :root {
      --chat--color--primary: #16324f;
      --chat--color--primary-shade-50: #122a42;
      --chat--color--secondary: #c9a14a;
      --chat--color-secondary-shade-50: #b8923f;
      --chat--color-dark: #16324f;
      --chat--border-radius: 12px;
      --chat--toggle--background: #16324f;
      --chat--message--user--background: #c9a14a;
      --chat--button--background--primary: #c9a14a;
      --chat--header--padding: 1.25rem 1.5rem;
      --chat--heading--font-size: 1.7em;
      --chat--subtitle--line-height: 1.4;
    }

    /* Hide n8n default launcher */
    .chat-window-toggle {
      opacity: 0 !important;
      pointer-events: none !important;
      width: 1px !important;
      height: 1px !important;
      overflow: hidden !important;
    }

    /* Hide n8n chat when voice mode is active */
    body.paradise-voice-mode .chat-window,
    body.paradise-voice-mode .chat-layout,
    body.paradise-voice-mode .chat-window-wrapper,
    body.paradise-voice-mode [class*="chat-window"],
    body.paradise-voice-mode [class*="chat-layout"] {
      display: none !important;
      visibility: hidden !important;
      pointer-events: none !important;
    }

    /* Hide Vapi's own green floating button */
    .vapi-btn,
    .vapi-btn-is-idle,
    .vapi-btn-is-active,
    .vapi-btn-is-speaking,
    .vapi-btn-pill,
    div[id*="vapi"],
    button[class*="vapi"],
    iframe[src*="vapi"] {
      display: none !important;
      opacity: 0 !important;
      visibility: hidden !important;
      pointer-events: none !important;
    }

    /* Do not hide our Paradise launcher */
    #paradise-ai-launcher,
    #paradise-ai-launcher *,
    #paradise-ai-menu,
    #paradise-ai-menu *,
    #paradise-voice-status,
    #paradise-voice-status * {
      visibility: visible !important;
      pointer-events: auto !important;
    }

    #paradise-ai-launcher {
      position: fixed;
      right: 24px;
      bottom: 24px;
      z-index: 999999;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    #paradise-ai-main-btn,
    #paradise-ai-back-btn,
    #paradise-ai-end-call-btn {
      background: #16324f;
      color: #ffffff;
      border: none;
      border-radius: 999px;
      padding: 14px 20px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.25);
    }

    #paradise-ai-back-btn {
      display: none;
      background: #c9a14a;
      color: #16324f;
    }

    #paradise-ai-end-call-btn {
      display: none;
      background: #b42318;
      color: #ffffff;
      margin-left: 8px;
    }

    body.paradise-mode-selected #paradise-ai-main-btn {
      display: none;
    }

    body.paradise-mode-selected #paradise-ai-back-btn {
      display: inline-block;
    }

    body.paradise-call-active #paradise-ai-end-call-btn {
      display: inline-block;
    }

    /* Icon-only options menu */
    #paradise-ai-menu {
      display: none;
      position: absolute;
      right: 0;
      bottom: 64px;
      background: #ffffff;
      border-radius: 999px;
      padding: 10px;
      gap: 10px;
      box-shadow: 0 18px 45px rgba(0, 0, 0, 0.22);
      border: 1px solid rgba(22, 50, 79, 0.12);
    }

    #paradise-ai-menu.active {
      display: flex;
      align-items: center;
    }

    .paradise-ai-icon-option {
      width: 56px;
      height: 56px;
      border: none;
      border-radius: 50%;
      cursor: pointer;
      font-size: 25px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.18);
    }

    .paradise-ai-icon-option:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 26px rgba(0, 0, 0, 0.22);
    }

    #paradise-open-chat {
      background: #ffffff;
      color: #16324f;
    }

    #paradise-open-voice {
      background: #c9a14a;
      color: #16324f;
    }

    /* Voice status card */
    #paradise-voice-status {
      display: none;
      position: absolute;
      right: 0;
      bottom: 64px;
      width: 280px;
      background: #ffffff;
      border-radius: 18px;
      box-shadow: 0 18px 45px rgba(0, 0, 0, 0.22);
      overflow: hidden;
      border: 1px solid rgba(22, 50, 79, 0.12);
    }

    #paradise-voice-status.active {
      display: block;
    }

    .paradise-voice-status-header {
      background: #16324f;
      color: #ffffff;
      padding: 16px;
      text-align: center;
    }

    .paradise-voice-status-header strong {
      display: block;
      font-size: 16px;
    }

    .paradise-voice-status-body {
      padding: 18px;
      color: #555555;
      font-size: 14px;
      line-height: 1.45;
      text-align: center;
    }

    .paradise-pulse {
      width: 46px;
      height: 46px;
      margin: 0 auto 12px;
      border-radius: 50%;
      background: #c9a14a;
      animation: paradisePulse 1.4s infinite;
    }

    @keyframes paradisePulse {
      0% {
        transform: scale(0.95);
        opacity: 0.75;
      }

      70% {
        transform: scale(1.15);
        opacity: 0.25;
      }

      100% {
        transform: scale(0.95);
        opacity: 0.75;
      }
    }

    /* n8n chat header customization */
    .chat-header {
      display: flex !important;
      flex-direction: column !important;
      align-items: center !important;
      text-align: center !important;
      gap: 4px;
    }

    .chat-header::before {
      content: "";
      display: block;
      width: 150px;
      height: 46px;
      margin: 0 auto 4px;
      background-image: url("https://www.paradiserealestate.es/crm/pages/agencies/paradisepro/assets/logofooter.svg");
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;
    }

    .chat-header h1 {
      margin: 0 !important;
      line-height: 1.15 !important;
    }

    .chat-header p {
      margin: 0 !important;
      opacity: 0.9;
    }

    .chat-message {
      position: relative !important;
      overflow: visible !important;
    }

    .chat-message-from-bot {
      margin-left: 46px;
    }

    .chat-message-from-user {
      margin-right: 46px;
    }

    @media (max-width: 600px) {
      #paradise-ai-launcher {
        right: 16px;
        bottom: 16px;
      }

      #paradise-voice-status {
        width: 255px;
      }

      #paradise-ai-main-btn,
      #paradise-ai-back-btn,
      #paradise-ai-end-call-btn {
        padding: 13px 17px;
        font-size: 14px;
      }

      .paradise-ai-icon-option {
        width: 52px;
        height: 52px;
        font-size: 23px;
      }
    }
  </style>
</head>

<body>
  <div id="paradise-ai-launcher">

    <!-- Icon-only menu -->
    <div id="paradise-ai-menu">
      <button
        class="paradise-ai-icon-option"
        id="paradise-open-chat"
        title="Chat with Ana"
        aria-label="Chat with Ana">
        💬
      </button>

      <button
        class="paradise-ai-icon-option"
        id="paradise-open-voice"
        title="Call Ana"
        aria-label="Call Ana">
        📞
      </button>
    </div>

    <!-- Voice interface -->
    <div id="paradise-voice-status">
      <div class="paradise-voice-status-header">
        <strong>Ana Voice Assistant</strong>
      </div>

      <div class="paradise-voice-status-body">
        <div class="paradise-pulse"></div>
        <div id="paradise-voice-status-text">Connecting to Ana...</div>
      </div>
    </div>

    <button id="paradise-ai-main-btn">Talk to Ana</button>
    <button id="paradise-ai-back-btn">← Back to options</button>
    <button id="paradise-ai-end-call-btn">End call</button>
  </div>

  <!-- Vapi official script loader -->
  <script>
    const VAPI_PUBLIC_KEY = '9585658c-2c48-4824-b6ec-aca50aac826e';
    const VAPI_ASSISTANT_ID = '9b1c1276-181f-4255-a532-d20ee1d40b88';

    let paradiseVapiInstance = null;
    let paradiseVapiLoading = false;
    let paradiseCallActive = false;

    function hideVapiFloatingUi() {
      const possibleVapiElements = document.querySelectorAll(
        '.vapi-btn, .vapi-btn-is-idle, .vapi-btn-is-active, .vapi-btn-is-speaking, .vapi-btn-pill, div[id*="vapi"], button[class*="vapi"], iframe[src*="vapi"]'
      );

      possibleVapiElements.forEach(function (element) {
        if (element.closest('#paradise-ai-launcher')) return;

        element.style.display = 'none';
        element.style.opacity = '0';
        element.style.visibility = 'hidden';
        element.style.pointerEvents = 'none';
      });
    }

    function loadVapiOfficialScript() {
      return new Promise(function (resolve, reject) {
        if (window.vapiSDK) {
          resolve(window.vapiSDK);
          return;
        }

        if (paradiseVapiLoading) {
          const checkInterval = setInterval(function () {
            if (window.vapiSDK) {
              clearInterval(checkInterval);
              resolve(window.vapiSDK);
            }

            hideVapiFloatingUi();
          }, 250);

          setTimeout(function () {
            clearInterval(checkInterval);
            reject(new Error('Vapi SDK loading timeout'));
          }, 10000);

          return;
        }

        paradiseVapiLoading = true;

        const script = document.createElement('script');
        script.src = 'https://cdn.jsdelivr.net/gh/VapiAI/html-script-tag@latest/dist/assets/index.js';
        script.async = true;
        script.defer = true;

        script.onload = function () {
          paradiseVapiLoading = false;

          hideVapiFloatingUi();

          if (window.vapiSDK) {
            resolve(window.vapiSDK);
          } else {
            reject(new Error('Vapi SDK loaded but window.vapiSDK not found'));
          }
        };

        script.onerror = function () {
          paradiseVapiLoading = false;
          reject(new Error('Failed to load Vapi official script'));
        };

        document.body.appendChild(script);
      });
    }

    async function getVapiInstance() {
      if (paradiseVapiInstance) {
        hideVapiFloatingUi();
        return paradiseVapiInstance;
      }

      const sdk = await loadVapiOfficialScript();

      paradiseVapiInstance = sdk.run({
        apiKey: VAPI_PUBLIC_KEY,
        assistant: VAPI_ASSISTANT_ID,
        config: {
          position: 'bottom-right',
          theme: 'light'
        }
      });

      setTimeout(hideVapiFloatingUi, 100);
      setTimeout(hideVapiFloatingUi, 300);
      setTimeout(hideVapiFloatingUi, 800);
      setTimeout(hideVapiFloatingUi, 1500);
      setTimeout(hideVapiFloatingUi, 2500);

      return paradiseVapiInstance;
    }
  </script>

  <!-- Launcher logic -->
  <script>
    const mainBtn = document.getElementById('paradise-ai-main-btn');
    const backBtn = document.getElementById('paradise-ai-back-btn');
    const endCallBtn = document.getElementById('paradise-ai-end-call-btn');
    const menu = document.getElementById('paradise-ai-menu');
    const chatBtn = document.getElementById('paradise-open-chat');
    const voiceBtn = document.getElementById('paradise-open-voice');
    const voiceStatus = document.getElementById('paradise-voice-status');
    const voiceStatusText = document.getElementById('paradise-voice-status-text');

    function hideN8nChatHard() {
      document.body.classList.add('paradise-voice-mode');

      const possibleChatElements = document.querySelectorAll(
        '.chat-window, .chat-layout, .chat-window-wrapper, [class*="chat-window"], [class*="chat-layout"]'
      );

      possibleChatElements.forEach(function (element) {
        element.style.display = 'none';
        element.style.visibility = 'hidden';
        element.style.pointerEvents = 'none';
      });
    }

    function showN8nChatAgain() {
      document.body.classList.remove('paradise-voice-mode');

      const possibleChatElements = document.querySelectorAll(
        '.chat-window, .chat-layout, .chat-window-wrapper, [class*="chat-window"], [class*="chat-layout"]'
      );

      possibleChatElements.forEach(function (element) {
        element.style.display = '';
        element.style.visibility = '';
        element.style.pointerEvents = '';
      });
    }

    function openN8nChat() {
      showN8nChatAgain();

      if (typeof window.paradiseOpenChat === 'function') {
        window.paradiseOpenChat();
        return;
      }

      const selectors = [
        '.chat-window-toggle',
        '.chat-window-toggle button',
        '[aria-label="Open chat"]',
        '[aria-label="Toggle chat"]'
      ];

      for (const selector of selectors) {
        const button = document.querySelector(selector);

        if (button) {
          button.click();
          return;
        }
      }

      console.warn('n8n chat button not found yet.');
    }

    function closeN8nChatIfOpen() {
      const selectors = [
        '[aria-label="Close chat"]',
        '[aria-label="Toggle chat"]',
        '.chat-window-toggle',
        '.chat-window-toggle button'
      ];

      for (const selector of selectors) {
        const button = document.querySelector(selector);

        if (button) {
          button.click();
          break;
        }
      }
    }

    async function startVapiCall() {
      menu.classList.remove('active');

      closeN8nChatIfOpen();
      hideN8nChatHard();
      hideVapiFloatingUi();

      document.body.classList.add('paradise-mode-selected');
      document.body.classList.add('paradise-call-active');

      voiceStatus.classList.add('active');
      voiceStatusText.textContent = 'Connecting to Ana...';

      try {
        const instance = await getVapiInstance();

        hideVapiFloatingUi();

        if (instance && typeof instance.start === 'function') {
          paradiseCallActive = true;
          voiceStatusText.textContent = 'Starting call. Please allow microphone access...';

          await instance.start();

          hideVapiFloatingUi();

          voiceStatusText.textContent = 'You are connected with Ana. You can speak now.';
          return;
        }

        const possibleButtons = document.querySelectorAll(
          '.vapi-btn, .vapi-btn-is-idle, .vapi-btn-pill, button[class*="vapi"]'
        );

        for (const button of possibleButtons) {
          if (button.closest('#paradise-ai-launcher')) continue;

          button.click();

          paradiseCallActive = true;
          voiceStatusText.textContent = 'Starting call. Please allow microphone access...';

          setTimeout(hideVapiFloatingUi, 100);
          setTimeout(hideVapiFloatingUi, 300);
          setTimeout(hideVapiFloatingUi, 800);

          return;
        }

        throw new Error('Could not find Vapi start method or button.');
      } catch (error) {
        console.error('Vapi start error:', error);
        paradiseCallActive = false;
        document.body.classList.remove('paradise-call-active');
        voiceStatusText.textContent = 'Voice could not start. Please check microphone permission, HTTPS, and Vapi settings.';
      }
    }

    function stopVapiCall() {
      try {
        if (paradiseVapiInstance && typeof paradiseVapiInstance.stop === 'function') {
          paradiseVapiInstance.stop();
        }
      } catch (error) {
        console.error('Vapi stop error:', error);
      }

      paradiseCallActive = false;
      document.body.classList.remove('paradise-call-active');
      voiceStatusText.textContent = 'Call ended.';

      hideVapiFloatingUi();
    }

    mainBtn.addEventListener('click', function () {
      voiceStatus.classList.remove('active');
      menu.classList.toggle('active');
      hideVapiFloatingUi();
    });

    chatBtn.addEventListener('click', function () {
      menu.classList.remove('active');
      voiceStatus.classList.remove('active');

      if (paradiseCallActive) {
        stopVapiCall();
      }

      document.body.classList.add('paradise-mode-selected');
      document.body.classList.remove('paradise-call-active');

      showN8nChatAgain();

      setTimeout(function () {
        openN8nChat();
      }, 300);
    });

    voiceBtn.addEventListener('click', function () {
      hideVapiFloatingUi();
      startVapiCall();
    });

    backBtn.addEventListener('click', function () {
      if (paradiseCallActive) {
        stopVapiCall();
      }

      closeN8nChatIfOpen();
      showN8nChatAgain();

      document.body.classList.remove('paradise-mode-selected');
      document.body.classList.remove('paradise-call-active');

      voiceStatus.classList.remove('active');
      menu.classList.add('active');

      hideVapiFloatingUi();
    });

    endCallBtn.addEventListener('click', function () {
      stopVapiCall();
    });

    document.addEventListener('click', function (event) {
      const launcher = document.getElementById('paradise-ai-launcher');

      if (!launcher.contains(event.target)) {
        menu.classList.remove('active');
      }

      hideVapiFloatingUi();
    });

    setInterval(hideVapiFloatingUi, 1000);
  </script>

  <!-- n8n Chat + Logger -->
  <script type="module">
    import { createChat } from 'https://cdn.jsdelivr.net/npm/@n8n/chat/dist/chat.bundle.es.js';

    const CHAT_WEBHOOK_URL = 'https://n8n.patom.dev/webhook/b1f5269f-a52e-46e7-aff2-ea4103f5eae0/chat';
    const LOGGER_WEBHOOK_URL = 'https://n8n.patom.dev/webhook/website-chat-logger';

    function getConversationId() {
      let conversationId = localStorage.getItem('paradise_chat_conversation_id');

      if (conversationId && conversationId.startsWith('website_')) {
        conversationId = conversationId.replace(/^website_/, '');
        localStorage.setItem('paradise_chat_conversation_id', conversationId);
      }

      if (!conversationId) {
        conversationId = crypto.randomUUID();
        localStorage.setItem('paradise_chat_conversation_id', conversationId);
      }

      return conversationId;
    }

    async function logWebsiteChatMessage(role, message, extraData = {}) {
      const cleanMessage = String(message || '')
        .replace(/\r?\n|\r/g, ' ')
        .replace(/\s+/g, ' ')
        .trim();

      if (!cleanMessage) return;

      try {
        await fetch(LOGGER_WEBHOOK_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            conversation_id: getConversationId(),
            role: role,
            message: cleanMessage,
            timestamp: new Date().toISOString(),
            name: extraData.name || null,
            phone_number: extraData.phone_number || null,
            email: extraData.email || null,
            label: 'website_chatbot',
            source: window.location.href,
            user_agent: navigator.userAgent
          })
        });
      } catch (error) {
        console.error('Chat logger failed:', error);
      }
    }

    createChat({
      webhookUrl: CHAT_WEBHOOK_URL,
      mode: 'window',
      showWelcomeScreen: false,
      chatSessionKey: 'sessionId',
      chatInputKey: 'chatInput',
      metadata: {
        conversation_id: getConversationId(),
        source: window.location.href
      },
      initialMessages: [
        "Hi, I'm Ana 👋 your Costa Blanca property guide.",
        "Tell me what you're after — buy, sell, or a valuation — and I'll take it from there. Feel free to write in English, Español, Nederlands, Deutsch or Français 🌍"
      ],
      i18n: {
        en: {
          title: "Let's find your paradise",
          subtitle: "Ana's here 24/7 to find your Costa Blanca property",
          footer: '',
          getStarted: 'New Conversation',
          inputPlaceholder: 'Type your message…'
        }
      }
    });

    window.paradiseOpenChat = function () {
      const selectors = [
        '.chat-window-toggle',
        '.chat-window-toggle button',
        '[aria-label="Open chat"]',
        '[aria-label="Toggle chat"]'
      ];

      for (const selector of selectors) {
        const button = document.querySelector(selector);

        if (button) {
          button.click();
          return;
        }
      }

      console.warn('n8n chat button not found yet.');
    };

    const alreadyLoggedMessages = new Set();

    function getMessageText(messageEl) {
      const text = messageEl.innerText || messageEl.textContent || '';

      return String(text)
        .replace(/\r?\n|\r/g, ' ')
        .replace(/\s+/g, ' ')
        .trim();
    }

    function getMessageRole(messageEl) {
      if (messageEl.classList.contains('chat-message-from-user')) {
        return 'user';
      }

      if (messageEl.classList.contains('chat-message-from-bot')) {
        return 'bot';
      }

      return null;
    }

    function logExistingChatMessages() {
      const messageElements = document.querySelectorAll('.chat-message');

      messageElements.forEach((messageEl) => {
        const role = getMessageRole(messageEl);
        const cleanText = getMessageText(messageEl);

        if (!role || !cleanText) return;

        const isInitialMessage =
          cleanText.includes("Hi, I'm Ana") ||
          cleanText.includes("Tell me what you're after");

        if (isInitialMessage) return;

        const uniqueKey = getConversationId() + ':' + role + ':' + cleanText;

        if (alreadyLoggedMessages.has(uniqueKey)) return;

        alreadyLoggedMessages.add(uniqueKey);
        logWebsiteChatMessage(role, cleanText);
      });
    }

    function startChatMessageObserver() {
      const observer = new MutationObserver(function () {
        logExistingChatMessages();
      });

      observer.observe(document.body, {
        childList: true,
        subtree: true,
        characterData: true
      });

      logExistingChatMessages();
    }

    setTimeout(startChatMessageObserver, 1200);
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Paradise Chat Test</title>

  <link href="https://cdn.jsdelivr.net/npm/@n8n/chat/dist/style.css" rel="stylesheet" />

  <style>
    body {
      font-family: system-ui, sans-serif;
      padding: 3rem;
      background: #f6f7f9;
    }

    /* ---- Brand colors + header sizing ---- */
    :root {
      --chat--color--primary: #16324f;
      --chat--color--primary-shade-50: #122a42;
      --chat--color--secondary: #c9a14a;
      --chat--color-secondary-shade-50: #b8923f;
      --chat--color-dark: #16324f;
      --chat--border-radius: 12px;
      --chat--toggle--background: #16324f;
      --chat--message--user--background: #c9a14a;
      --chat--button--background--primary: #c9a14a;
      --chat--header--padding: 1.25rem 1.5rem;
      --chat--heading--font-size: 1.7em;
      --chat--subtitle--line-height: 1.4;
    }

    /* ---- Centered header: logo → title → subtitle ---- */
    .chat-header {
      display: flex !important;
      flex-direction: column !important;
      align-items: center !important;
      text-align: center !important;
      gap: 4px;
    }

    .chat-header::before {
      content: "";
      display: block;
      width: 150px;
      height: 46px;
      margin: 0 auto 4px;
      background-image: url("https://www.paradiserealestate.es/crm/pages/agencies/paradisepro/assets/logofooter.svg");
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;
    }

    .chat-header h1 {
      margin: 0 !important;
      line-height: 1.15 !important;
    }

    .chat-header p {
      margin: 0 !important;
      opacity: 0.9;
    }

    /* ---- Message avatars ---- */
    .chat-message {
      position: relative !important;
      overflow: visible !important;
    }

    /* Ana (bot) — navy circle, left of her messages */
    .chat-message-from-bot {
      margin-left: 46px;
    }

    .chat-message-from-bot::before {
      content: "";
      position: absolute;
      left: -46px;
      bottom: 0;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background-color: #16324f;
      background-image: url("data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20width='18'%20height='18'%20viewBox='0%200%2024%2024'%20fill='none'%20stroke='white'%20stroke-width='2'%20stroke-linecap='round'%20stroke-linejoin='round'%3E%3Cpath%20d='M12%208V4H8'/%3E%3Crect%20width='16'%20height='12'%20x='4'%20y='8'%20rx='2'/%3E%3Cpath%20d='M2%2014h2'/%3E%3Cpath%20d='M20%2014h2'/%3E%3Cpath%20d='M15%2013v2'/%3E%3Cpath%20d='M9%2013v2'/%3E%3C/svg%3E");
      background-repeat: no-repeat;
      background-position: center;
      background-size: 18px;
    }

    /* User — gold circle, right of their messages */
    .chat-message-from-user {
      margin-right: 46px;
    }

    .chat-message-from-user::before {
      content: "";
      position: absolute;
      right: -46px;
      bottom: 0;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background-color: #c9a14a;
      background-image: url("data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20width='18'%20height='18'%20viewBox='0%200%2024%2024'%20fill='none'%20stroke='white'%20stroke-width='2'%20stroke-linecap='round'%20stroke-linejoin='round'%3E%3Cpath%20d='M19%2021v-2a4%204%200%200%200-4-4H9a4%204%200%200%200-4%204v2'/%3E%3Ccircle%20cx='12'%20cy='7'%20r='4'/%3E%3C/svg%3E");
      background-repeat: no-repeat;
      background-position: center;
      background-size: 18px;
    }
  </style>
</head>

<body>
  <script type="module">
    import { createChat } from 'https://cdn.jsdelivr.net/npm/@n8n/chat/dist/chat.bundle.es.js';

    const CHAT_WEBHOOK_URL = 'https://n8n.patom.dev/webhook/b1f5269f-a52e-46e7-aff2-ea4103f5eae0/chat';

    /*
      TEST URL:
      Use this while your logger workflow is in "Listen for test event" mode.
    */
    const LOGGER_WEBHOOK_URL = 'https://n8n.patom.dev/webhook-test/website-chat-logger';

    /*
      PRODUCTION URL:
      When your logger workflow is active, replace the line above with this:
      const LOGGER_WEBHOOK_URL = 'https://n8n.patom.dev/webhook/website-chat-logger';
    */

    function getConversationId() {
      let conversationId = localStorage.getItem('paradise_chat_conversation_id');

      if (!conversationId) {
        conversationId = 'website_' + crypto.randomUUID();
        localStorage.setItem('paradise_chat_conversation_id', conversationId);
      }

      return conversationId;
    }

    async function logWebsiteChatMessage(role, message, extraData = {}) {
      const cleanMessage = String(message || '')
        .replace(/\r?\n|\r/g, ' ')
        .replace(/\s+/g, ' ')
        .trim();

      if (!cleanMessage) return;

      try {
        console.log('Sending to logger:', role, cleanMessage);

        const response = await fetch(LOGGER_WEBHOOK_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            conversation_id: getConversationId(),
            role: role,
            message: cleanMessage,
            timestamp: new Date().toISOString(),
            name: extraData.name || null,
            phone_number: extraData.phone_number || null,
            email: extraData.email || null,
            label: 'website_chatbot',
            source: window.location.href,
            user_agent: navigator.userAgent
          })
        });

        console.log('Logger response:', response.status);
      } catch (error) {
        console.error('Chat logger failed:', error);
      }
    }

    createChat({
      webhookUrl: CHAT_WEBHOOK_URL,

      mode: 'window',
      showWelcomeScreen: false,

      chatSessionKey: 'sessionId',
      chatInputKey: 'chatInput',

      metadata: {
        conversation_id: getConversationId(),
        source: window.location.href
      },

      initialMessages: [
        "Hi, I'm Ana 👋 your Costa Blanca property guide.",
        "Tell me what you're after buy, sell, or a valuation and I'll take it from there. Feel free to write in English, Español, Nederlands, Deutsch or Français 🌍"
      ],

      i18n: {
        en: {
          title: "Let's find your paradise",
          subtitle: "Ana's here 24/7 to find your Costa Blanca property",
          footer: '',
          getStarted: 'New Conversation',
          inputPlaceholder: 'Type your message…',
        },
      },
    });

    /*
      Message observer:
      This watches the n8n chat UI and logs every new user/bot message.
    */
    const alreadyLoggedMessages = new Set();

    function getMessageText(messageEl) {
      const text =
        messageEl.innerText ||
        messageEl.textContent ||
        '';

      return String(text)
        .replace(/\r?\n|\r/g, ' ')
        .replace(/\s+/g, ' ')
        .trim();
    }

    function getMessageRole(messageEl) {
      if (messageEl.classList.contains('chat-message-from-user')) {
        return 'user';
      }

      if (messageEl.classList.contains('chat-message-from-bot')) {
        return 'bot';
      }

      return null;
    }

    function logExistingChatMessages() {
      const messageElements = document.querySelectorAll('.chat-message');

      messageElements.forEach((messageEl) => {
        const role = getMessageRole(messageEl);
        const cleanText = getMessageText(messageEl);

        if (!role || !cleanText) return;

        /*
          Skip initial welcome messages if you do not want them saved.
          Remove this block if you want to save initial messages too.
        */
        const isInitialMessage =
          cleanText.includes("Hi, I'm Ana") ||
          cleanText.includes("Tell me what you're after");

        if (isInitialMessage) return;

        const uniqueKey = role + ':' + cleanText;

        if (alreadyLoggedMessages.has(uniqueKey)) return;

        alreadyLoggedMessages.add(uniqueKey);
        logWebsiteChatMessage(role, cleanText);
      });
    }

    function startChatMessageObserver() {
      const observer = new MutationObserver(() => {
        logExistingChatMessages();
      });

      observer.observe(document.body, {
        childList: true,
        subtree: true,
        characterData: true
      });

      logExistingChatMessages();
    }

    /*
      Wait for the n8n chat widget to render before observing messages.
    */
    setTimeout(startChatMessageObserver, 1200);
  </script>
</body>
</html>
